plugins {
    id "com.android.application"
}

android {
    namespace "com.androidbuilder"
    compileSdk 35

    defaultConfig {
        applicationId "com.androidbuilder"
        minSdk 31
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation project(":embedded-runtime")
}
